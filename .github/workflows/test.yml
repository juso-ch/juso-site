name: Tests

on:
  push:
    branches: [master, testing, "upgrade/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13-alpine
        env:
          POSTGRES_USER: juso
          POSTGRES_PASSWORD: juso
          POSTGRES_DB: juso
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SQL_ENGINE: django.db.backends.postgresql
      POSTGRES_DB: juso
      POSTGRES_USER: juso
      POSTGRES_PASSWORD: juso
      SQL_HOST: localhost
      SQL_PORT: 5432
      DEBUG: "0"
      SECRET_KEY: ci-secret-key
      ALLOWED_HOSTS: "*"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Bumped alongside the Django upgrade phases (3.10 -> 3.12 -> 3.13).
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # feincms3-meta fork (see Dockerfile) — kept until the meta upgrade.
          pip install "feincms3-meta @ git+https://github.com/sacovo/feincms3-meta.git@4132326eb74d897f6d4c019d820f59edad8a94f0"

      - name: System checks
        run: python manage.py check

      - name: Migrations are in sync with models
        run: python manage.py makemigrations --check --dry-run

      - name: Migrate
        run: python manage.py migrate --noinput

      - name: Run test suite
        run: python manage.py test juso.tests_smoke -v2

  # Validate the production image builds (base image, deps, feincms3-meta fork,
  # compilemessages). Build-only — publishing happens via docker-publish.yml on
  # push to master/testing.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build . --file Dockerfile.prod --tag juso-site:ci
